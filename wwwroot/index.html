<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dns Blocker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="main">
        <h1>Dns Blocker</h1>
        <br>
        <button id="globalEnabled" class="bigButton circle off">OFF</button>

    </div>

    <div id="listContainer">
        <div class="list">
            <div id="deviceList"></div>
            <button id="deviceList-add" class="listElement">+</button>
        </div>
        <div id="filterList" class="list"></div>
    </div>

    <div id="loginPopup">
        <h2>Login / Register</h2>
        <div id="loginInputFields">
            <input type="text" id="username" name="username" placeholder="Username">
            <input type="password" id="password" name="password" placeholder="Password">
        </div>
        <div id="loginButtons">
            <button id="register">Register</button>
            <button id="login">Login</button>
        </div>
    </div>

    <script type="module" src="dist/DnsBlocker.js"></script>
</body>

</html>
